<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاً لنساعد - النسخة المتكاملة</title>
    <!-- تضمين مكتبة Tailwind CSS للتنسيق -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- تضمين مكتبات React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- تضمين Babel لتحويل كود JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- تضمين مكتبة Lucide للأيقونات -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Tajawal', sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { 
            Camera, Mic, Image, Bell, LogOut, Heart, Activity, 
            User, Settings, ShieldAlert, Hand, Info, Navigation, 
            Sun, Moon, Play, X, CheckCircle, MessageCircle, 
            HelpCircle, Sparkles, PlusCircle 
        } = lucideReact;

        const App = () => {
            const [step, setStep] = useState('welcome'); 
            const [ageGroup, setAgeGroup] = useState(null); 
            const [activeFeature, setActiveFeature] = useState(null);
            const [isEmergency, setIsEmergency] = useState(false);
            const [inputText, setInputText] = useState("");
            const [cameraOn, setCameraOn] = useState(false);
            const [detectedText, setDetectedText] = useState("في انتظار الإشارة...");
            const videoRef = useRef(null);

            const [avatar, setAvatar] = useState({
                rHand: { x: 270, y: 220, r: 0, s: 1 },
                lHand: { x: 130, y: 220, r: 0, s: 1 },
                head: { y: 0, r: 0 },
                mouth: "normal",
                eyes: "open"
            });

            const isYoung = ageGroup === 'young';
            
            const theme = {
                bg: isYoung 
                    ? 'bg-gradient-to-br from-blue-50 via-white to-sky-100' 
                    : 'bg-gradient-to-br from-slate-50 via-white to-blue-50',
                card: 'bg-white/95 backdrop-blur-md rounded-[40px] shadow-xl border-2 border-blue-50',
                primary: 'bg-sky-500 hover:bg-sky-600 text-white shadow-lg',
                text: 'text-sky-900',
                subText: 'text-sky-400',
                icon: 'text-sky-500'
            };

            const dictionary = [
                { word: "صلاة", action: () => setAvatar(s => ({...s, rHand:{x:310, y:80, r:-110, s:1.1}, lHand:{x:90, y:80, r:110, s:1.1}})) },
                { word: "طعام", action: () => setAvatar(s => ({...s, rHand:{x:200, y:125, r:-15, s:0.9}, mouth:"open"})) },
                { word: "ماء", action: () => setAvatar(s => ({...s, rHand:{x:210, y:110, r:-5, s:1}})) },
                { word: "شكراً", action: () => setAvatar(s => ({...s, rHand:{x:200, y:180, r:0, s:1.2}, mouth:"smile"})) },
                { word: "أحبك", action: () => setAvatar(s => ({...s, rHand:{x:230, y:160, r:-45}, lHand:{x:170, y:160, r:45}, mouth:"smile"})) },
                { word: "مساعدة", action: () => setAvatar(s => ({...s, rHand:{x:200, y:180}, lHand:{x:200, y:210}})) },
                { word: "بيت", action: () => setAvatar(s => ({...s, rHand:{x:240, y:130, r:-45}, lHand:{x:160, y:130, r:45}})) },
                { word: "نوم", action: () => setAvatar(s => ({...s, rHand:{x:260, y:100, r:-30}, eyes:"blink"})) },
                { word: "مستشفى", action: () => setAvatar(s => ({...s, rHand:{x:200, y:150}, lHand:{x:150, y:150, r:90}})) },
                { word: "دواء", action: () => setAvatar(s => ({...s, rHand:{x:200, y:120}, mouth:"open"})) },
                { word: "نعم", action: () => setAvatar(s => ({...s, head:{y:15}, mouth:"smile"})) },
                { word: "لا", action: () => setAvatar(s => ({...s, head:{y:0, r:15}})) },
                { word: "فطور", action: () => setAvatar(s => ({...s, rHand:{x:200, y:130, s:0.8}})) },
                { word: "أمي", action: () => setAvatar(s => ({...s, rHand:{x:200, y:140}, mouth:"smile"})) },
                { word: "أبي", action: () => setAvatar(s => ({...s, rHand:{x:200, y:90}})) }
            ];

            const performAction = (text) => {
                const entry = dictionary.find(d => text.includes(d.word));
                setAvatar({ rHand: { x: 270, y: 220, r: 0, s: 1 }, lHand: { x: 130, y: 220, r: 0, s: 1 }, head: { y: 0, r: 0 }, mouth: "normal", eyes: "open" });
                setTimeout(() => {
                    if (entry) entry.action();
                    const speech = new SpeechSynthesisUtterance(text);
                    speech.lang = 'ar-SA';
                    window.speechSynthesis.speak(speech);
                }, 150);
            };

            const handleCamera = async () => {
                if (cameraOn) {
                    if (videoRef.current && videoRef.current.srcObject) {
                        videoRef.current.srcObject.getTracks().forEach(t => t.stop());
                    }
                    setCameraOn(false);
                } else {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                        if (videoRef.current) {
                            videoRef.current.srcObject = stream;
                        }
                        setCameraOn(true);
                    } catch (e) { console.error(e); }
                }
            };

            const DetailedHand = ({ state, side }) => (
                <g transform={`translate(${state.x}, ${state.y}) rotate(${state.r}) scale(${state.s})`} className="transition-all duration-500">
                    <path d="M-20,0 Q0,-15 20,0 L18,40 Q0,50 -18,40 Z" fill="#ffdbac" stroke="#d4a373" strokeWidth="1" />
                    {[ -16, -7, 2, 11 ].map((xPos, i) => (
                        <rect key={i} x={xPos} y={-35} width="7" height={35} rx="3" fill="#ffdbac" stroke="#d4a373" strokeWidth="0.5" />
                    ))}
                    <path d={side === 'r' ? "M18,5 Q30,-5 25,-15 L15,-5 Z" : "M-18,5 Q-30,-5 -25,-15 L-15,-5 Z"} fill="#ffdbac" stroke="#d4a373" strokeWidth="0.5" />
                </g>
            );

            if (step === 'welcome') {
                return (
                    <div className="min-h-screen bg-white flex flex-col items-center justify-center p-6 text-sky-900 text-center relative overflow-hidden">
                        <div className="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-sky-50 rounded-full blur-[100px]"></div>
                        <div className="relative mb-8 text-[120px] animate-bounce">🫱🏽‍🫲🏻</div>
                        <h1 className="text-7xl font-black mb-4 text-sky-600 tracking-tight">معاً لنساعد</h1>
                        <p className="text-xl text-sky-400 mb-10 font-bold">بوابتكم الذكية للتواصل بلغة الإشارة</p>
                        <button onClick={() => setStep('login')} className="bg-sky-500 text-white px-20 py-5 rounded-full font-black text-xl shadow-xl hover:scale-105 active:scale-95 transition-all">
                            ابدأ الآن
                        </button>
                    </div>
                );
            }

            if (step === 'login') {
                return (
                    <div className="min-h-screen bg-sky-50 flex items-center justify-center p-4" dir="rtl">
                        <div className="bg-white rounded-[50px] p-12 w-full max-w-4xl shadow-2xl border-b-[10px] border-sky-100">
                            <h2 className="text-5xl font-black text-sky-900 mb-12 text-center">اختر الواجهة</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <button onClick={() => { setAgeGroup('young'); setStep('home'); }} className="p-10 rounded-[40px] border-4 border-sky-50 bg-sky-50 hover:border-sky-400 hover:bg-white transition-all text-center">
                                    <div className="text-8xl mb-6">🧒🏻</div>
                                    <h3 className="text-3xl font-black text-sky-600">جيل الأمل</h3>
                                </button>
                                <button onClick={() => { setAgeGroup('senior'); setStep('home'); }} className="p-10 rounded-[40px] border-4 border-indigo-50 bg-indigo-50/30 hover:border-indigo-500 hover:bg-white transition-all text-center">
                                    <div className="text-8xl mb-6">🧓🏻</div>
                                    <h3 className="text-3xl font-black text-indigo-900">جيل الحكمة</h3>
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`min-h-screen ${theme.bg} ${theme.text} transition-all duration-700 font-sans`} dir="rtl">
                    {isEmergency && <div className="fixed inset-0 z-[1000] bg-red-500/20 animate-pulse pointer-events-none"></div>}

                    <header className={`p-5 sticky top-0 z-[100] border-b ${theme.card} flex justify-between items-center mx-4 mt-4`}>
                        <div className="flex items-center gap-4">
                            <div className="bg-sky-500 p-3 rounded-xl text-white"><Sparkles size={20} /></div>
                            <div><h2 className="text-xl font-black text-sky-900">معاً لنساعد</h2></div>
                        </div>
                        <button onClick={() => setStep('login')} className="p-3 bg-red-50 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all"><LogOut size={20} /></button>
                    </header>

                    <main className="p-8 max-w-6xl mx-auto">
                        <div className="mb-12">
                             <h1 className="text-5xl font-black mb-3 text-sky-900">كيف يمكننا مساعدتك؟</h1>
                             <p className="text-sky-400 text-lg font-bold">كل الخدمات مصممة لتسهيل تواصلك.</p>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {[
                                { id: 'camera', icon: Camera, title: 'المترجم الذكي', desc: 'رصد فوري للغة الإشارة عبر الكاميرا.', color: 'sky' },
                                { id: 'avatar', icon: Hand, title: 'الأفاتار المدرب', desc: 'مدرب يعرض لك الإشارات بدقة تعليمية.', color: 'blue' },
                                { id: 'radar', icon: Bell, title: 'رادار الأمان', desc: 'تنبيه بصري للأصوات المحيطة الهامة.', color: 'red' }
                            ].map((item) => (
                                <div key={item.id} onClick={() => setActiveFeature(item.id)} className={`${theme.card} p-10 cursor-pointer group hover:-translate-y-2 transition-all border-b-[6px] border-sky-100 hover:border-sky-400`}>
                                    <item.icon size={48} className="text-sky-500 mb-8 group-hover:scale-110 transition-transform" />
                                    <h3 className="text-2xl font-black mb-3 text-sky-900">{item.title}</h3>
                                    <p className="text-sky-400 font-medium leading-relaxed">{item.desc}</p>
                                </div>
                            ))}
                        </div>

                        <footer className={`mt-24 p-12 ${theme.card} text-center border-t-4 border-sky-100`}>
                             <Heart className="mx-auto mb-6 text-red-400 animate-pulse" size={40} fill="currentColor" />
                             <div className="mb-8">
                                 <p className="text-sky-400 font-bold mb-2">تنفيذ المبدعتين:</p>
                                 <p className="text-3xl font-black text-sky-900">فوزية السيد & خولة الغامدي</p>
                             </div>
                             
                             <div className="grid grid-cols-1 md:grid-cols-2 gap-8 pt-8 border-t border-sky-50">
                                 <div>
                                     <p className="text-sky-400 font-bold mb-3 uppercase text-xs tracking-widest">بمساعدة خارجية من:</p>
                                     <div className="flex flex-wrap justify-center gap-3 font-bold text-sky-700">
                                            {["مريان رصرص", "سمية فخرو"].map(n => 
                                                <span key={n} className="bg-sky-50 px-4 py-2 rounded-xl text-sm border border-sky-100">{n}</span>
                                            )}
                                     </div>
                                 </div>
                                 <div>
                                     <p className="text-sky-400 font-bold mb-3 uppercase text-xs tracking-widest">تحت إشراف المعلمة:</p>
                                     <p className="text-xl font-black text-sky-900 bg-sky-50 inline-block px-6 py-2 rounded-xl border border-sky-100">أحلام السالمي</p>
                                 </div>
                             </div>
                        </footer>
                    </main>

                    {activeFeature && (
                        <div className="fixed inset-0 z-[500] bg-white/95 backdrop-blur-md flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-5xl p-10 relative shadow-2xl rounded-[50px] border border-sky-50 overflow-hidden">
                                <button onClick={() => { setActiveFeature(null); if(cameraOn) handleCamera(); }} className="absolute top-8 left-8 p-4 bg-red-50 text-red-500 rounded-full hover:bg-red-500 hover:text-white transition-all z-10"><X size={24} /></button>

                                {activeFeature === 'avatar' && (
                                    <div className="flex flex-col lg:flex-row gap-12 items-center">
                                        <div className="w-full lg:w-1/2 bg-sky-50 rounded-[60px] h-[550px] flex items-end justify-center overflow-hidden border-8 border-white shadow-inner relative">
                                            <svg viewBox="0 0 400 350" className="w-full h-full drop-shadow-lg">
                                                <path d="M60,350 Q200,160 340,350" fill="#e0f2fe" stroke="#bae6fd" strokeWidth="2" />
                                                <g transform={`translate(0, ${avatar.head.y}) rotate(${avatar.head.r}, 200, 100)`} className="transition-all duration-500">
                                                    <circle cx="200" cy="100" r="65" fill="#ffdbac" stroke="#d4a373" strokeWidth="1" />
                                                    <g>
                                                        {avatar.eyes === "blink" ? (
                                                            <><line x1="175" y1="95" x2="192" y2="95" stroke="#1e293b" strokeWidth="3" /><line x1="208" y1="95" x2="225" y2="95" stroke="#1e293b" strokeWidth="3" /></>
                                                        ) : (
                                                            <><circle cx="182" cy="95" r="5" fill="#1e293b" /><circle cx="218" cy="95" r="5" fill="#1e293b" /></>
                                                        )}
                                                    </g>
                                                    {avatar.mouth === "smile" ? (
                                                        <path d="M180,125 Q200,145 220,125" stroke="#ef4444" fill="none" strokeWidth="4" strokeLinecap="round" />
                                                    ) : avatar.mouth === "open" ? (
                                                        <ellipse cx="200" cy="130" rx="10" ry="6" fill="#7f1d1d" />
                                                    ) : (
                                                        <line x1="188" y1="130" x2="212" y2="130" stroke="#1e293b" strokeWidth="3" strokeLinecap="round" />
                                                    )}
                                                </g>
                                                <DetailedHand state={avatar.rHand} side="r" />
                                                <DetailedHand state={avatar.lHand} side="l" />
                                            </svg>
                                        </div>
                                        
                                        <div className="w-full lg:w-1/2 space-y-8">
                                            <h2 className="text-4xl font-black text-sky-900">الأفاتار المدرب</h2>
                                            <div className="grid grid-cols-3 gap-2 max-h-[300px] overflow-y-auto p-4 bg-sky-50/50 rounded-[30px] border border-sky-100 custom-scrollbar">
                                                {dictionary.map(item => (
                                                    <button key={item.word} onClick={() => performAction(item.word)} className="p-4 bg-white border border-sky-100 rounded-xl font-bold text-sm text-sky-800 hover:bg-sky-500 hover:text-white transition-all shadow-sm">
                                                        {item.word}
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="relative">
                                                <input type="text" value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder="اكتب جملة..." className="w-full p-8 rounded-[40px] bg-white border-4 border-sky-50 focus:border-sky-500 text-center font-black text-3xl outline-none shadow-sm" />
                                                <button onClick={() => performAction(inputText)} className="absolute left-3 top-3 bottom-3 aspect-square bg-sky-500 text-white rounded-full flex items-center justify-center hover:scale-105 transition-transform shadow-lg"><Play size={24} fill="white" /></button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeFeature === 'camera' && (
                                    <div className="text-center space-y-8">
                                        <div className="relative aspect-video bg-slate-50 rounded-[40px] overflow-hidden border-8 border-white shadow-xl">
                                             <video ref={videoRef} autoPlay className="w-full h-full object-cover transform -scale-x-100" />
                                             <div className="absolute bottom-8 left-8 right-8 bg-white/90 backdrop-blur-md p-8 rounded-[30px] border border-sky-50 flex items-center justify-between shadow-xl">
                                                    <div className="flex items-center gap-6 text-right">
                                                        <div className="w-16 h-16 bg-sky-100 rounded-2xl flex items-center justify-center text-sky-600"><MessageCircle size={32} /></div>
                                                        <div><p className="text-sky-300 text-[10px] font-black uppercase mb-1">الرصد الذكي</p><span className="text-sky-900 font-black text-4xl">{detectedText}</span></div>
                                                    </div>
                                                    <CheckCircle size={48} className="text-emerald-500" />
                                             </div>
                                             {!cameraOn && <div className="absolute inset-0 flex items-center justify-center bg-sky-50 text-sky-900 text-2xl font-black">اضغط لتفعيل الكاميرا</div>}
                                        </div>
                                        <button onClick={handleCamera} className="w-full max-w-2xl mx-auto py-8 rounded-[30px] bg-sky-500 text-white text-3xl font-black shadow-lg hover:bg-sky-600 transition-all">
                                            {cameraOn ? 'تعطيل الكاميرا' : 'تفعيل المترجم الذكي'}
                                        </button>
                                    </div>
                                )}

                                {activeFeature === 'radar' && (
                                    <div className="text-center py-12 space-y-10">
                                        <div className={`w-[350px] h-[350px] mx-auto rounded-full border-[15px] border-sky-50 flex items-center justify-center relative ${isEmergency ? 'animate-pulse' : ''}`}>
                                             <Bell size={150} className={`${isEmergency ? 'text-red-500' : 'text-sky-200'} transition-all`} />
                                             {isEmergency && <div className="absolute -top-6 bg-red-600 text-white px-8 py-3 rounded-full font-black text-lg animate-bounce shadow-xl">🚨 رصد صوت مرتفع</div>}
                                        </div>
                                        <h2 className="text-5xl font-black text-sky-900">رادار الأمان</h2>
                                        <button onClick={() => setIsEmergency(!isEmergency)} className={`w-full max-w-xl mx-auto py-8 ${isEmergency ? 'bg-slate-100 text-slate-500' : 'bg-red-50 text-red-600'} rounded-full font-black text-2xl transition-all`}>
                                            {isEmergency ? 'إغلاف التنبيه' : 'اختبار الحماية'}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
