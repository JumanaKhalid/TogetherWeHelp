<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاً لنساعد - النسخة النهائية</title>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- MediaPipe للتتبع الذكي للمفاصل -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; margin: 0; overflow-x: hidden; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        canvas { transform: scaleX(-1); border-radius: 2rem; }
        .radar-wave { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Icons = {
            Camera: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>,
            Ear: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8.5a6.5 6.5 0 1 1 13 0c0 6-6 6-6 10a2 2 0 1 1-4 0"/><path d="M15 8.5a2.5 2.5 0 0 0-5 0"/></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            Mic: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>,
            Heart: (p) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={p.fill || "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        };

        function App() {
            const [step, setStep] = useState('welcome');
            const [ageGroup, setAgeGroup] = useState(null);
            const [activeFeature, setActiveFeature] = useState(null);
            const [cameraActive, setCameraActive] = useState(false);
            const [detectedSign, setDetectedSign] = useState("جاري التحليل...");
            const [audioLevel, setAudioLevel] = useState(0);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const audioCtxRef = useRef(null);
            const analyzerRef = useRef(null);

            const لساني_الناطق = [
                { t: "أنا بخير", e: "😊", c: "bg-green-100 text-green-700" },
                { t: "أحتاج مساعدة", e: "🆘", c: "bg-red-100 text-red-700" },
                { t: "أين نحن؟", e: "📍", c: "bg-blue-100 text-blue-700" },
                { t: "أريد النوم", e: "🛌", c: "bg-purple-100 text-purple-700" },
                { t: "أنا جائع", e: "🍴", c: "bg-orange-100 text-orange-700" },
                { t: "شكراً جزيلاً", e: "🙏", c: "bg-amber-100 text-amber-700" },
                { t: "كيف حالك؟", e: "❓", c: "bg-sky-100 text-sky-700" },
                { t: "أحبكم", e: "💖", c: "bg-rose-100 text-rose-700" }
            ];

            const قاموسي = [
                { w: "عائلة", d: "تشكيل دائرة باليدين أمام الصدر", i: "👨‍👩‍👧‍👦", k: "اجتماعي" },
                { w: "مدرسة", d: "ضرب الكفين ببعضهما بشكل أفقي", i: "🏫", k: "تعليم" },
                { w: "صديق", d: "تشابك أصابع اليدين معاً", i: "🤝", k: "اجتماعي" },
                { w: "ماء", d: "رفع السبابة بجانب الفم", i: "💧", k: "أساسي" },
                { w: "سعيد", d: "تحريك اليدين على الصدر للأعلى", i: "😃", k: "مشاعر" },
                { w: "طوارئ", d: "تحريك اليدين بشكل دائري فوق الرأس", i: "🚨", k: "أمان" }
            ];

            useEffect(() => {
                if (activeFeature === 'cam' && cameraActive) {
                    const hands = new Hands({
                        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
                    });
                    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
                    hands.onResults((results) => {
                        const canvasCtx = canvasRef.current.getContext('2d');
                        canvasCtx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                        canvasCtx.drawImage(results.image, 0, 0, canvasRef.current.width, canvasRef.current.height);
                        if (results.multiHandLandmarks) {
                            for (const landmarks of results.multiHandLandmarks) {
                                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#3b82f6', lineWidth: 4});
                                drawLandmarks(canvasCtx, landmarks, {color: '#f43f5e', lineWidth: 2, radius: 3});
                            }
                            setDetectedSign(results.multiHandLandmarks.length > 0 ? "جاري قراءة الحركة..." : "بانتظار لغتك...");
                        }
                    });
                    const camera = new Camera(videoRef.current, {
                        onFrame: async () => { await hands.send({image: videoRef.current}); },
                        width: 640, height: 480
                    });
                    camera.start();
                    return () => camera.stop();
                }
            }, [activeFeature, cameraActive]);

            const startRadar = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    analyzerRef.current = audioCtxRef.current.createAnalyser();
                    const source = audioCtxRef.current.createMediaStreamSource(stream);
                    source.connect(analyzerRef.current);
                    const updateLevel = () => {
                        if (activeFeature !== 'radar') return;
                        const dataArray = new Uint8Array(analyzerRef.current.frequencyBinCount);
                        analyzerRef.current.getByteFrequencyData(dataArray);
                        let sum = 0;
                        for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
                        setAudioLevel(Math.round(sum / dataArray.length));
                        requestAnimationFrame(updateLevel);
                    };
                    updateLevel();
                } catch (err) { console.error("Mic access denied"); }
            };

            useEffect(() => {
                if (activeFeature === 'radar') startRadar();
                return () => audioCtxRef.current?.close();
            }, [activeFeature]);

            const speak = (text) => {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'ar-SA';
                window.speechSynthesis.speak(u);
            };

            if (step === 'welcome') return (
                <div className="min-h-screen bg-gradient-to-b from-sky-100 to-white flex flex-col items-center justify-center p-6 text-center">
                    <div className="text-[150px] mb-8 animate-float drop-shadow-2xl">🤝</div>
                    <h1 className="text-7xl font-black text-sky-600 mb-4 tracking-tight">معاً لنساعد</h1>
                    <p className="text-2xl text-slate-500 font-bold mb-12">جيل جديد من التواصل الذكي والآمن</p>
                    <button onClick={() => setStep('login')} className="bg-sky-500 text-white px-16 py-6 rounded-full text-2xl font-black shadow-xl hover:scale-105 transition-all">ابدأ الآن ✨</button>
                </div>
            );

            if (step === 'login') return (
                <div className="min-h-screen bg-white flex flex-col items-center justify-center p-6 text-center">
                    <h2 className="text-4xl font-black mb-16 text-slate-800">كيف تحب أن نتواصل؟</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10 w-full max-w-4xl">
                        <button onClick={() => {setAgeGroup('young'); setStep('home')}} className="p-12 border-4 border-orange-100 rounded-[50px] hover:bg-orange-50 transition-all group">
                            <div className="text-8xl mb-6 group-hover:scale-110 transition-transform">🧒</div>
                            <span className="text-4xl font-black text-orange-700 block">فئة الأمل</span>
                        </button>
                        <button onClick={() => {setAgeGroup('senior'); setStep('home')}} className="p-12 border-4 border-indigo-100 rounded-[50px] hover:bg-indigo-50 transition-all group">
                            <div className="text-8xl mb-6 group-hover:scale-110 transition-transform">👴</div>
                            <span className="text-4xl font-black text-indigo-700 block">فئة الحكمة</span>
                        </button>
                    </div>
                </div>
            );

            return (
                <div className={`min-h-screen ${ageGroup === 'senior' ? 'bg-slate-50' : 'bg-blue-50/20'}`}>
                    <header className="bg-white/80 backdrop-blur-md p-6 shadow-sm flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-4">
                            <div className="bg-sky-500 text-white p-2 rounded-xl">🤝</div>
                            <h1 className="text-3xl font-black text-slate-800">معاً لنساعد</h1>
                        </div>
                        <button onClick={() => setStep('welcome')} className="p-4 bg-red-50 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition-all"><Icons.LogOut /></button>
                    </header>

                    <main className="p-8 max-w-6xl mx-auto space-y-12">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 text-center">
                            {[
                                { id: 'cam', title: 'مترجم لغتي', icon: <Icons.Camera />, color: 'from-blue-500 to-blue-700' },
                                { id: 'radar', title: 'أذني الرقمية', icon: <Icons.Ear />, color: 'from-rose-500 to-rose-700' },
                                { id: 'aac', title: 'لساني الناطق', icon: <Icons.Mic />, color: 'from-emerald-500 to-emerald-700' },
                                { id: 'lib', title: 'قاموسي', icon: <Icons.BookOpen />, color: 'from-amber-500 to-amber-700' }
                            ].map(item => (
                                <button key={item.id} onClick={() => setActiveFeature(item.id)} className="bg-white p-8 rounded-[45px] shadow-xl hover:-translate-y-4 transition-all border-b-8 border-slate-100">
                                    <div className={`bg-gradient-to-br ${item.color} text-white p-6 rounded-3xl w-fit mx-auto mb-6`}>{item.icon}</div>
                                    <h3 className="font-black text-2xl text-slate-700">{item.title}</h3>
                                </button>
                            ))}
                        </div>

                        <footer className="mt-20 p-12 bg-white rounded-[60px] shadow-sm text-center border-t-2 border-sky-50">
                             <div className="flex justify-center gap-2 mb-6"><Icons.Heart fill="#f43f5e" className="text-rose-500 w-10 h-10"/></div>
                             <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div>
                                    <p className="text-slate-400 text-xs uppercase font-bold mb-2 tracking-widest">إشراف وتوجيه</p>
                                    <p className="text-slate-800 font-black text-xl">أ. أحلام السالمي</p>
                                </div>
                                <div className="border-x-2 border-slate-50">
                                    <p className="text-sky-400 text-xs uppercase font-bold mb-2 tracking-widest">فريق التطوير</p>
                                    <p className="text-sky-900 font-black text-lg">فوزية السيد</p>
                                    <p className="text-sky-900 font-black text-lg">خولة الغامدي</p>
                                </div>
                                <div>
                                    <p className="text-emerald-400 text-xs uppercase font-bold mb-2 tracking-widest">مساعدة خارجية</p>
                                    <p className="text-emerald-900 font-black text-lg">مريان رصرص</p>
                                    <p className="text-emerald-900 font-black text-lg">سمية فخرو</p>
                                </div>
                             </div>
                        </footer>
                    </main>

                    {activeFeature && (
                        <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-2xl z-[100] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-5xl rounded-[60px] shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
                                <div className="p-8 border-b flex justify-between items-center bg-slate-50">
                                    <h2 className="text-4xl font-black text-slate-800">
                                        {activeFeature === 'cam' && '📸 مترجم لغتي'}
                                        {activeFeature === 'radar' && '👂 أذني الرقمية'}
                                        {activeFeature === 'aac' && '🗣️ لساني الناطق'}
                                        {activeFeature === 'lib' && '📖 قاموسي'}
                                    </h2>
                                    <button onClick={() => {setActiveFeature(null); setCameraActive(false);}} className="p-4 bg-white text-rose-500 rounded-full shadow-md"><Icons.X /></button>
                                </div>
                                <div className="p-10 overflow-y-auto flex-1">
                                    {activeFeature === 'cam' && (
                                        <div className="space-y-8 text-center">
                                            <div className="relative aspect-video bg-black rounded-[40px] overflow-hidden border-8 border-white shadow-2xl mx-auto max-w-3xl">
                                                <video ref={videoRef} className="hidden" />
                                                <canvas ref={canvasRef} width="640" height="480" className="w-full h-full" />
                                                {!cameraActive && <div className="absolute inset-0 flex items-center justify-center bg-slate-800 text-white font-black text-2xl">الكاميرا مغلقة</div>}
                                            </div>
                                            <div className="p-8 bg-blue-50 rounded-3xl border-4 border-blue-100 max-w-xl mx-auto">
                                                <p className="text-4xl font-black text-blue-800">{detectedSign}</p>
                                            </div>
                                            {!cameraActive && (
                                                <button onClick={() => setCameraActive(true)} className="bg-blue-600 text-white px-12 py-5 rounded-full font-black text-2xl hover:scale-105 transition-all">تشغيل المترجم الذكي 🧠</button>
                                            )}
                                        </div>
                                    )}
                                    {activeFeature === 'radar' && (
                                        <div className="text-center py-10 space-y-12">
                                            <div className="relative w-72 h-72 mx-auto">
                                                <div className={`absolute inset-0 rounded-full border-8 border-rose-500/20 radar-wave`}></div>
                                                <div className="relative w-full h-full border-4 border-rose-100 rounded-full flex items-center justify-center overflow-hidden bg-white shadow-inner">
                                                    <div className="absolute bottom-0 w-full bg-gradient-to-t from-rose-600 to-rose-400 transition-all duration-150" style={{height: `${Math.min(100, (audioLevel/150)*100)}%`}}></div>
                                                    <Icons.Ear size={100} className={`z-10 ${audioLevel > 40 ? 'text-white' : 'text-rose-500'}`} />
                                                </div>
                                            </div>
                                            <div className="space-y-4">
                                                <h3 className="text-4xl font-black text-slate-800">أذني الرقمية تسمع لك</h3>
                                                <p className="text-2xl text-slate-500 font-bold">مستوى الصوت: <span className="text-rose-600">{Math.round((audioLevel/255)*100)}%</span></p>
                                                {audioLevel > 90 && <div className="bg-red-600 text-white p-6 rounded-3xl animate-bounce font-black text-2xl">🚨 رصد صوت عالٍ</div>}
                                            </div>
                                        </div>
                                    )}
                                    {activeFeature === 'aac' && (
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
                                            {لساني_الناطق.map(w => (
                                                <button key={w.t} onClick={() => speak(w.t)} className={`${w.c} p-10 rounded-[50px] shadow-sm hover:-translate-y-2 active:scale-95 transition-all flex flex-col items-center gap-4`}>
                                                    <span className="text-7xl">{w.e}</span>
                                                    <span className="text-2xl font-black">{w.t}</span>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                    {activeFeature === 'lib' && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-right">
                                            {قاموسي.map(item => (
                                                <div key={item.w} className="flex items-center gap-8 p-8 bg-slate-50 rounded-[40px] border-2 border-slate-100 hover:border-amber-400 transition-all group">
                                                    <div className="text-8xl group-hover:scale-110 transition-transform drop-shadow-md">{item.i}</div>
                                                    <div>
                                                        <span className="text-xs bg-amber-100 text-amber-700 px-3 py-1 rounded-full font-black mb-2 inline-block">{item.k}</span>
                                                        <div className="font-black text-3xl text-slate-800 mb-1">{item.w}</div>
                                                        <div className="text-slate-500 font-bold text-lg">{item.d}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
